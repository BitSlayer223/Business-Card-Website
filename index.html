<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Business Card Website</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
        <div class="business-card-container">
            <div class="card-content">
                <h1>Build  <span class="highlight-text">personal website</span> that</span> <span class="highlight-text">elevates</span> your business</h1>
                <p>Create a professional online presence that showcases your skills, builds trust with potential clients, and turns visitors into customers with a polished, modern homepage designed for your business.
                
                <dl class="stats">
                    <div class="stat-item">
                        <dt class="stat-value">100+</dt>
                        <dd class="stat-label">Templates</dd>
                    </div>
                    <div class="stat-item">
                        <dt class="stat-value">10k+</dt>
                        <dd class="stat-label">reviews</dd>
                    </div>
                    <div class="stat-item">
                        <dt class="stat-value">24/7</dt>
                        <dd class="stat-label">Support</dd>
                    </div>
                 </dl>
            </div>
            <div class="card-image-container">
                <img src="images/Business-Image.jpg" alt="Business professionals collaborating during an office meeting" class="business-card-image" />
            </div>
        </div>

    </main>
  </body>
</html>
